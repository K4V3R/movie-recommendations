<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#6c63ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Фильмотека">
    <title>Фильмотека</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="movies.css">
</head>
<body>
    <div class="page-layout">
    <div class="page-layout__main">
        <header class="page-header">
            <span class="page-header__spacer" aria-hidden="true"></span>
            <h1>Рекомендации фильмов</h1>
            <button type="button" class="theme-toggle" id="themeToggle" aria-label="Переключить на светлую тему">☀️</button>
        </header>

        <div class="top-bar-btns">
            <button type="button" class="favourites-bar-btn" id="favouritesBtn">Избранное (0)</button>
            <button type="button" class="favourites-bar-btn watched-bar-btn" id="watchedBtn">Смотрел (0)</button>
        </div>

        <div class="data-io-bar">
            <button type="button" class="data-io-btn" id="exportBtn">⬇ Экспорт</button>
            <button type="button" class="data-io-btn" id="importBtn">⬆ Импорт</button>
            <input type="file" id="importFileInput" accept=".json" hidden aria-hidden="true">
            <span class="data-io-msg" id="dataIoMsg" hidden aria-live="polite"></span>
        </div>

        <div class="search-box">
            <div class="search-box__wrap">
                <input type="text" id="searchInput" placeholder="Введите фильм или сериал" autocomplete="off" aria-autocomplete="list" aria-controls="searchSuggest" aria-expanded="false">
                <div class="search-suggest" id="searchSuggest" hidden role="listbox" aria-label="Подсказки поиска"></div>
            </div>
            <button id="searchBtn">Найти</button>
        </div>

        <div class="random-movie-bar">
            <button type="button" class="random-movie-btn" id="randomMovieBtn">🎲 Случайный фильм</button>
        </div>

        <div class="search-history" id="searchHistory" hidden>
            <div class="search-history__row">
                <div class="search-history__chips" id="searchHistoryChips"></div>
                <button type="button" class="search-history__clear-all" id="searchHistoryClearAll" hidden>Очистить всё</button>
            </div>
        </div>

        <div class="filter-bar" id="filterBar" hidden>
            <div class="filter-group">
                <span class="filter-label">Тип</span>
                <div class="filter-toggle" role="group" aria-label="Тип контента">
                    <button type="button" class="filter-chip" data-filter-type="all">Все</button>
                    <button type="button" class="filter-chip" data-filter-type="movie">Фильмы</button>
                    <button type="button" class="filter-chip" data-filter-type="tv">Сериалы</button>
                </div>
            </div>
            <div class="filter-group">
                <span class="filter-label">Мин. рейтинг</span>
                <div class="filter-toggle" role="group" aria-label="Минимальный рейтинг">
                    <button type="button" class="filter-chip" data-filter-rating="0">Любой</button>
                    <button type="button" class="filter-chip" data-filter-rating="6">6+</button>
                    <button type="button" class="filter-chip" data-filter-rating="7">7+</button>
                    <button type="button" class="filter-chip" data-filter-rating="8">8+</button>
                </div>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="sortSelect">Сортировка</label>
                <select class="filter-select" id="sortSelect">
                    <option value="default">По умолчанию</option>
                    <option value="rating_desc">Рейтинг ↓</option>
                    <option value="rating_asc">Рейтинг ↑</option>
                    <option value="year_desc">Год ↓</option>
                    <option value="year_asc">Год ↑</option>
                    <option value="title_asc">Название А-Я</option>
                    <option value="title_desc">Название Я-А</option>
                </select>
            </div>
        </div>

        <h2 class="results-context-heading" id="resultsContextHeading" hidden></h2>

        <div class="results" id="results"></div>
    </div>

    <aside class="sidebar" id="trendingSidebar" aria-labelledby="trendingSidebarTitle">
        <div class="sidebar__header">
            <h2 class="sidebar__title" id="trendingSidebarTitle">🔥 Новинки недели</h2>
            <button type="button" class="sidebar__refresh" id="trendingRefresh">Обновить</button>
        </div>
        <div class="sidebar__list" id="trendingList"></div>

        <div class="sidebar__genres">
            <h3 class="sidebar__genres-title" id="sidebarGenresTitle">Жанры</h3>
            <div class="sidebar__genre-chips" id="sidebarGenreChips"></div>
        </div>

        <div class="sidebar__stats">
            <h3 class="sidebar__stats-title">📊 Моя статистика</h3>
            <ul class="stats-list" id="statsList">
                <li class="stats-row"><span class="stats-row__label">В избранном</span><span class="stats-row__value" id="statFavCount">0 фильмов</span></li>
                <li class="stats-row"><span class="stats-row__label">Просмотрено</span><span class="stats-row__value" id="statWatchedCount">0 фильмов</span></li>
                <li class="stats-row"><span class="stats-row__label">Средняя оценка</span><span class="stats-row__value" id="statAvgRating">—</span></li>
                <li class="stats-row"><span class="stats-row__label">Любимый жанр</span><span class="stats-row__value" id="statFavGenre">—</span></li>
            </ul>
        </div>
    </aside>
    </div>

    <div class="detail-modal" id="detailModal" hidden aria-hidden="true">
        <div class="detail-modal__dialog" role="dialog" aria-modal="true" aria-labelledby="detailModalTitle">
            <button type="button" class="detail-modal__close" id="detailModalClose" aria-label="Закрыть">✕</button>
            <div class="detail-modal__content" id="detailModalContent"></div>
        </div>
    </div>

    <div class="compare-bar" id="compareBar" hidden>
        <div class="compare-bar__slots" id="compareSlots"></div>
        <button type="button" class="compare-bar__btn" id="compareBtn" disabled>Сравнить</button>
    </div>

    <div class="compare-modal" id="compareModal" hidden aria-hidden="true">
        <div class="compare-modal__dialog" role="dialog" aria-modal="true" aria-label="Сравнение фильмов">
            <button type="button" class="compare-modal__close" id="compareModalClose" aria-label="Закрыть">✕</button>
            <div class="compare-modal__content" id="compareModalContent"></div>
        </div>
    </div>

    <div class="kb-hint" id="kbHint" aria-hidden="true">
        <span class="kb-hint__item"><kbd>/</kbd> Поиск</span>
        <span class="kb-hint__sep">·</span>
        <span class="kb-hint__item"><kbd>↑</kbd><kbd>↓</kbd> Навигация</span>
        <span class="kb-hint__sep">·</span>
        <span class="kb-hint__item"><kbd>Enter</kbd> Детали</span>
        <span class="kb-hint__sep">·</span>
        <span class="kb-hint__item"><kbd>F</kbd> Избранное</span>
        <span class="kb-hint__sep">·</span>
        <span class="kb-hint__item"><kbd>W</kbd> Просмотрено</span>
        <span class="kb-hint__sep">·</span>
        <span class="kb-hint__item"><kbd>Esc</kbd> Закрыть</span>
    </div>

    <script src="movies.js"></script>
</body>
</html>
